<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Noctua</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="./CasaNoctua_Isotipo_Blanco.png">
    <style>
        :root {
            --violeta-oscuro: #1C0D2D;
            --blanco-roto: #E2DED3;
            --amarillo: #E8E31C;
            --violeta-medio: #2A1540;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--violeta-oscuro);
            color: var(--blanco-roto);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Starfield canvas ── */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Main wrapper ── */
        .wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 48px 24px 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ── Logo / Header ── */
        .brand {
            text-align: center;
            margin-bottom: 3px;
        }

        .owl-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 18px rgba(232,227,28,0.45));
            animation: floatOwl 4s ease-in-out infinite;
        }

        @keyframes floatOwl {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-8px); }
        }

        .brand-tagline {
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--amarillo);
            opacity: 0.8;
            margin-top: 6px;
        }

        /* ── Divider ── */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--amarillo), transparent);
            margin: 24px auto 36px;
        }

        /* ── Link cards ── */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 22px;
            border-radius: 14px;
            border: 1px solid rgba(226,222,211,0.15);
            background: rgba(42, 21, 64, 0.5);
            backdrop-filter: blur(8px);
            text-decoration: none;
            color: var(--blanco-roto);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(232,227,28,0.06) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        .link-card:hover::before {
            opacity: 1;
        }

        .link-card:hover {
            border-color: var(--amarillo);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 32px rgba(232,227,28,0.15), 0 0 0 1px rgba(232,227,28,0.2);
        }

        .link-card:active {
            transform: translateY(0) scale(0.99);
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
            transition: transform 0.35s ease;
        }

        .link-card:hover .card-icon {
            transform: scale(1.1) rotate(-4deg);
        }

        .icon-yt   { background: rgba(255, 0, 0, 0.15); }
        .icon-tt   { background: rgba(0, 242, 234, 0.1); }
        .icon-ig   { background: rgba(225, 48, 108, 0.12); }
        .icon-sp   { background: rgba(30, 215, 96, 0.12); }

        .card-text {
            flex: 1;
        }

        .card-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--amarillo);
            opacity: 0.75;
            display: block;
            margin-bottom: 2px;
        }

        .card-name {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card-arrow {
            font-size: 1rem;
            opacity: 0.4;
            transition: all 0.35s ease;
            flex-shrink: 0;
        }

        .link-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(4px);
            color: var(--amarillo);
        }

        /* ── Footer ── */
        .footer {
            margin-top: 48px;
            text-align: center;
            opacity: 0.35;
            font-size: 0.72rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ── Shooting star ── */
        .shooting-star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--amarillo);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--amarillo));
        }

        /* ── Entrance animations ── */
        .brand    { animation: fadeUp 0.7s ease both; }
        .divider  { animation: fadeUp 0.7s 0.15s ease both; }
        .link-card:nth-child(1) { animation: fadeUp 0.6s 0.25s ease both; }
        .link-card:nth-child(2) { animation: fadeUp 0.6s 0.35s ease both; }
        .link-card:nth-child(3) { animation: fadeUp 0.6s 0.45s ease both; }
        .link-card:nth-child(4) { animation: fadeUp 0.6s 0.55s ease both; }
        .footer   { animation: fadeUp 0.6s 0.7s ease both; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<script>
/* ── Starfield ── */
(function () {
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [];

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function randomStar() {
        return {
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.4 + 0.3,
            alpha: Math.random() * 0.6 + 0.2,
            twinkleSpeed: Math.random() * 0.02 + 0.005,
            twinkleDir: Math.random() > 0.5 ? 1 : -1,
            // star-shape (4 or 6 points)
            points: Math.random() > 0.7 ? 4 : 2
        };
    }

    function init() {
        resize();
        stars = Array.from({ length: 180 }, randomStar);
    }

    function drawStar(x, y, r, alpha, points) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#E8E31C';
        ctx.translate(x, y);

        if (points === 2) {
            // simple circle for smaller stars
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fill();
        } else {
            // 4-pointed star
            const outer = r * 2.2;
            const inner = r * 0.8;
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                const angle = (i * Math.PI) / 4;
                const radius = i % 2 === 0 ? outer : inner;
                if (i === 0) ctx.moveTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
                else ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
            }
            ctx.closePath();
            ctx.fill();
        }
        ctx.restore();
    }

    function animate() {
        ctx.clearRect(0, 0, W, H);

        stars.forEach(s => {
            s.alpha += s.twinkleSpeed * s.twinkleDir;
            if (s.alpha > 0.85 || s.alpha < 0.1) s.twinkleDir *= -1;
            drawStar(s.x, s.y, s.r, s.alpha, s.points);
        });

        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => { resize(); stars = Array.from({ length: 180 }, randomStar); });
    init();
    animate();
})();

/* ── Shooting stars ── */
(function () {
    function shoot() {
        const el = document.createElement('div');
        el.className = 'shooting-star';
        const startX = Math.random() * window.innerWidth;
        const startY = Math.random() * window.innerHeight * 0.5;
        el.style.cssText = `left:${startX}px;top:${startY}px;`;
        document.body.appendChild(el);

        const duration = 800 + Math.random() * 600;
        el.animate([
            { transform: 'translate(0,0)', opacity: 1 },
            { transform: `translate(${120 + Math.random()*80}px,${60 + Math.random()*40}px)`, opacity: 0 }
        ], { duration, easing: 'ease-out', fill: 'forwards' }).onfinish = () => el.remove();

        setTimeout(shoot, 2500 + Math.random() * 3500);
    }
    setTimeout(shoot, 1200);
})();
</script>
